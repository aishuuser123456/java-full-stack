<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.form-box {
    padding: 20px;
    border: 1px solid #ccc;
    width: 300px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}

input:focus {
    border: 2px solid blue;
}

button {
    width: 100%;
    padding: 10px;
}

button:hover {
    background: black;
    color: white;
}
</style>
</head>
<body>

<div class="form-box">
<h2>Register</h2>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">
<button>Submit</button>
</div>

</body>
</html>
