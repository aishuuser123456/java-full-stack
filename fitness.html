<!DOCTYPE html>
<html>
<head>
    <title>Fitness Form</title>
</head>
<body>

<h2 style="text-align:center;">Fitness Registration Form</h2>

<form>

<!-- Name -->
<label>Name:</label><br>
<input type="text" name="name" required><br><br>

<!-- Age -->
<label>Age:</label><br>
<input type="number" name="age" min="16" required><br><br>

<!-- Gender -->
<label>Gender:</label><br>
<input type="radio" name="gender" required> Male
<input type="radio" name="gender"> Female<br><br>

<!-- Fitness Goal -->
<label>Fitness Goal:</label><br>
<select required>
    <option value="">Select</option>
    <option>Weight Loss</option>
    <option>Muscle Gain</option>
    <option>Flexibility</option>
</select><br><br>

<!-- Workout Time -->
<label>Preferred Workout Time:</label><br>
<input type="time" required><br><br>

<!-- Checkbox -->
<input type="checkbox" required> I agree to health terms<br><br>

<!-- Buttons -->
<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

<hr>

</body>
</html>
