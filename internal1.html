<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Multiple</title>

        p {
            color: green;
        }
        div {
            background: lightgray;
            padding: 10px;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

<h1>Heading</h1>
<p>This is a paragraph</p>
<div>This is a div box</div>

</body>
</html>
