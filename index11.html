<!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: grid;
    grid-template-columns: 1fr 3fr;
}

.sidebar {
    background: lightgray;
    padding: 10px;
}

.blog {
    padding: 10px;
}

.card {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
}

.card:hover {
    background: #f0f0f0;
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">
    <h3>Menu</h3>
</div>

<div class="blog">
    <div class="card">Blog 1</div>
    <div class="card">Blog 2</div>
</div>

</div>

</body>
</html>
