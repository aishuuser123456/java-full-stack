<!DOCTYPE html>
<html>
<head>
    <title>Centered Box</title>
    <style>
        .box {
            width: 200px;
            margin: auto;              /* center box horizontally */
            background-color: lightblue;
            text-align: center;        /* center text inside box */
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    This is centered text
</div>

</body>
</html>
