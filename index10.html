<!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: grid;
    grid-template-columns: 200px 1fr;
}

.sidebar {
    background: #333;
    color: white;
    padding: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

tr:nth-child(even) {
    background: lightgray;
}

tr:hover {
    background: yellow;
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">Menu</div>

<div>
<table border="1">
<tr><th>Name</th><th>Marks</th></tr>
<tr><td>A</td><td>80</td></tr>
<tr><td>B</td><td>75</td></tr>
<tr><td>C</td><td>90</td></tr>
<tr><td>D</td><td>85</td></tr>
<tr><td>E</td><td>70</td></tr>
<tr><td>F</td><td>60</td></tr>
</table>
</div>

</div>

</body>
</html>
