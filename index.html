<!DOCTYPE html>
<html>
<head>
    <title>Centering Example</title>
</head>
<body>

    <!-- Centered Text -->
    <p style="text-align: center;">This text is centered</p>

    <!-- Centered Div -->
    <div style="width: 200px; margin: auto; background: lightblue; text-align:center;">
        Centered div
    </div>

    <br>

    <!-- Perfect Center (Horizontal + Vertical) -->
    <div style="display: flex; justify-content: center; align-items: center; height: 200px; background: lightgray;">
        <p>Perfect center</p>
    </div>

    <br>

    <!-- Horizontal Line -->
    <hr style="width: 50%; margin: auto;">

    <!-- Text Between Lines -->
    <p style="text-align: center;">Centered text between lines</p>

    <hr style="width: 50%; margin: auto;">

</body>
</html>
